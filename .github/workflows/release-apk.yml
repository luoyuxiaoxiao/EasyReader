name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release-meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          TAG="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "$TAG" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "::error::Release tag must look like v0.1.0, got '$TAG'."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check out tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release-meta.outputs.tag }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        run: |
          set -euo pipefail
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Validate signing secrets
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          # 只验证签名材料是否存在，不能在日志中输出 secret 内容。
          missing=0
          for name in RELEASE_KEYSTORE_BASE64 RELEASE_KEYSTORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name repository secret is required."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build unsigned release APK
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --stacktrace --no-daemon

      - name: Sign and verify release APK
        id: package
        env:
          TAG: ${{ steps.release-meta.outputs.tag }}
          EXPECTED_VERSION: ${{ steps.release-meta.outputs.version }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          BUILD_TOOLS="$ANDROID_HOME/build-tools/36.0.0"
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="$RUNNER_TEMP/EasyReader-${TAG}-release-aligned.apk"
          SIGNED_APK="app/build/outputs/apk/release/EasyReader-${TAG}-release.apk"
          KEYSTORE_FILE="$RUNNER_TEMP/release.keystore"
          RELEASE_NOTES="$RUNNER_TEMP/release-notes.md"

          VERSION_NAME="$(sed -nE 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' app/build.gradle.kts | head -n 1)"
          if [ "$VERSION_NAME" != "$EXPECTED_VERSION" ]; then
            echo "::error::Tag $TAG expects versionName $EXPECTED_VERSION, but app/build.gradle.kts has $VERSION_NAME."
            exit 1
          fi

          if [ ! -f "$UNSIGNED_APK" ]; then
            echo "::error::Unsigned APK not found: $UNSIGNED_APK"
            exit 1
          fi

          # 签名流程固定为：解码 keystore -> zipalign -> apksigner -> 校验签名和对齐。
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_FILE"
          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KEYSTORE_FILE" \
            --ks-key-alias "$RELEASE_KEY_ALIAS" \
            --ks-pass "pass:$RELEASE_KEYSTORE_PASSWORD" \
            --key-pass "pass:$RELEASE_KEY_PASSWORD" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$SIGNED_APK"
          "$BUILD_TOOLS/zipalign" -c -p 4 "$SIGNED_APK"

          SHA256="$(sha256sum "$SIGNED_APK" | awk '{print $1}')"
          printf '%s  %s\n' "$SHA256" "$(basename "$SIGNED_APK")" > "$SIGNED_APK.sha256"
          {
            echo "Signed release APK attached."
            echo
            echo "SHA-256: $SHA256"
          } > "$RELEASE_NOTES"

          echo "apk_path=$SIGNED_APK" >> "$GITHUB_OUTPUT"
          echo "sha256_path=$SIGNED_APK.sha256" >> "$GITHUB_OUTPUT"
          echo "release_notes=$RELEASE_NOTES" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyReader-${{ steps.release-meta.outputs.tag }}-release
          path: |
            ${{ steps.package.outputs.apk_path }}
            ${{ steps.package.outputs.sha256_path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag }}
          name: EasyReader ${{ steps.release-meta.outputs.tag }}
          body_path: ${{ steps.package.outputs.release_notes }}
          files: |
            ${{ steps.package.outputs.apk_path }}
            ${{ steps.package.outputs.sha256_path }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
